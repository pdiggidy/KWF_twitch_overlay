<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSEA Link – KWF Charity Stream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red:    #e8003d;
    --red2:   #ff1a52;
    --white:  #ffffff;
    --off:    #f0f0f0;
    --dark:   #0a0a0a;
    --card:   rgba(10,10,10,0.88);
    --stroke: rgba(232,0,61,0.4);
  }

  html {
    zoom: 2; /* render at 2× so OBS can scale down to 50% for sharp output */
  }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: 'Barlow', sans-serif;
  }

  /* ── Wrapper — sits bottom-left, sized for OBS ── */
  #overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 380px;
    background: var(--card);
    border: 1.5px solid var(--stroke);
    border-left: 3px solid var(--red);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 6px;
    padding: 16px 20px 14px;
    opacity: 0;
    transform: translateX(-16px);
    animation: slideIn 0.6s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
  }

  @keyframes slideIn {
    to { opacity: 1; transform: translateX(0); }
  }

  /* ── Header row ── */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .kwf-badge {
    background: var(--red);
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .campaign-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--white);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Amount row ── */
  .amounts {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 10px;
  }
  .amounts-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

  .raised {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 42px;
    color: var(--white);
    line-height: 1;
    letter-spacing: -0.01em;
    transition: color 0.4s;
  }

  .raised.bump {
    color: var(--red2);
    animation: bump 0.5s ease;
  }

  @keyframes bump {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.07); }
    100% { transform: scale(1); }
  }

  .currency {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--red);
    margin-right: 2px;
  }

  .goal-label {
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    font-weight: 600;
  }

  .goal-amount {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    font-weight: 600;
  }

  /* ── Progress bar ── */
  .bar-track {
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--red), var(--red2));
    border-radius: 99px;
    width: 0%;
    transition: width 1.2s cubic-bezier(0.22,1,0.36,1);
    position: relative;
  }

  .bar-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 20px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35));
    border-radius: 99px;
  }

  /* ── Footer row ── */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .pct {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--red);
    letter-spacing: 0.05em;
  }

  .donate-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.03em;
  }

  /* ── Donation alert popup ── */
  #alert {
    position: absolute;
    top: -70px;
    left: 0;
    width: 380px;
    background: var(--red);
    border-radius: 6px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transform: translateX(-420px);
    transition: transform 0.5s cubic-bezier(0.22,1,0.36,1);
    z-index: 10;
  }

  #alert.show {
    transform: translateX(0);
  }

  .alert-icon {
    font-size: 22px;
    flex-shrink: 0;
  }

  .alert-text {
    flex: 1;
  }

  .alert-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 15px;
    color: var(--white);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .alert-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.8);
    margin-top: 1px;
  }

  /* ── Pulse dot — live indicator ── */
  .live-dot {
    width: 7px;
    height: 7px;
    background: var(--red);
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
  }

  .live-dot::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: var(--red);
    opacity: 0.3;
    animation: pulse 2s ease infinite;
  }
  .top-section {
  display: flex;
  align-items: stretch;
  gap: 10px;
}

.top-left {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.glyphicon-qrcode {
  display: flex;
  align-items: center;
}

.glyphicon-qrcode img {
  height: 100%;
  width: auto;
  object-fit: contain;
}

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50%       { transform: scale(1.8); opacity: 0; }
  }
</style>
</head>
<body>

<!-- Main overlay -->
<div id="overlay">
  <div class="top-section">
    <div class="top-left">
      <div class="header">
        <div class="live-dot"></div>
        <div class="kwf-badge">KWF</div>
        <div class="campaign-name">Link Charity Stream 2026</div>
      </div>
      <div class="amounts">
        <span class="currency">€</span>
        <span class="raised" id="raised">0</span>
        <span class="goal-label">of&nbsp;</span>
        <span class="goal-amount" id="goal">€1.000</span>
      </div>
    </div>
    <div class="glyphicon-qrcode">
      <img src="KWF_qr.png" alt="QR code to donate" style="width: 84px; height: 84px; padding-bottom: 5px; image-rendering: pixelated;">
    </div>
  </div>
  <div class="container">
    <div class="bar-track">
      <div class="bar-fill" id="bar"></div>
    </div>
  </div>
  <div class="footer">
    <span class="pct" id="pct">0%</span>
    <span class="donate-hint">Click The Donate Button Down Below!</span>
  </div>
</div>

<script>
  // Use absolute URL so this works whether OBS loads via file:// or http://
  const SERVER_BASE = window.location.protocol === 'file:'
    ? 'http://localhost:8080'
    : window.location.origin;

  let lastRaised = null;

  function formatEuro(n) {
    return Math.round(n).toLocaleString('nl-NL');
  }

  function applyUpdate(data) {
    const { raised, goal } = data;
    const raisedEl = document.getElementById('raised');
    const goalEl   = document.getElementById('goal');
    const barEl    = document.getElementById('bar');
    const pctEl    = document.getElementById('pct');

    const pct = goal > 0 ? Math.min(100, (raised / goal) * 100) : 0;

    if (lastRaised !== null && raised > lastRaised) {
      raisedEl.classList.remove('bump');
      void raisedEl.offsetWidth; // reflow
      raisedEl.classList.add('bump');
    }
    lastRaised = raised;

    raisedEl.textContent = formatEuro(raised);
    goalEl.textContent   = '€' + formatEuro(goal);
    barEl.style.width    = pct.toFixed(1) + '%';
    pctEl.textContent    = pct.toFixed(1) + '%';
  }

  // Server-Sent Events: server pushes data the moment it changes.
  // EventSource auto-reconnects if the connection drops.
  const evtSource = new EventSource(SERVER_BASE + '/events');
  evtSource.onmessage = (e) => applyUpdate(JSON.parse(e.data));
  evtSource.onerror   = () => console.warn('[overlay] SSE reconnecting…');
</script>
</body>
</html>
